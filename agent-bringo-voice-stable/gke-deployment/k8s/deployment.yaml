apiVersion: apps/v1
kind: Deployment
metadata:
  name: bringo-multimodal-api
  labels:
    app: bringo-multimodal-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bringo-multimodal-api
  template:
    metadata:
      labels:
        app: bringo-multimodal-api
    spec:
      serviceAccountName: bringo-multimodal-api-sa
      containers:
        - name: bringo-multimodal-api
          # NOTE: deploy-gke.sh script replaces this at deploy time with versioned tag
          image: gcr.io/formare-ai/bringo-multimodal-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PROJECT_ID
              value: "formare-ai"
            - name: LOCATION
              value: "europe-west1"
            - name: STAGING_BUCKET
              value: "formare-ai-vector-search"
            - name: API_AUTH_KEY
              value: "bringo_secure_shield_2026"
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30 # Allows up to 5 minutes for startup
