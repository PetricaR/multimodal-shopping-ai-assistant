apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bringo-api-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "bringo-api-cert"
    kubernetes.io/ingress.global-static-ip-name: "bringo-api-ip" # Optional: Reserve static IP
spec:
  defaultBackend:
    service:
      name: bringo-multimodal-api
      port:
        number: 80
