apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bringo-multimodal-api-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bringo-multimodal-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: bringo-multimodal-api-vpa
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bringo-multimodal-api
  updatePolicy:
    updateMode: "Auto" # GKE will automatically adjust RAM/CPU based on usage
