# Cloud Build configuration for Bringo Session Keep-Alive Worker
# Usage: gcloud builds submit --config=workers/cloudbuild.yaml

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bringo-session-keepalive:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bringo-session-keepalive:$BUILD_ID'
      - '-f'
      - 'workers/Dockerfile.worker'
      - '.'
    timeout: 1200s

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/bringo-session-keepalive:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/bringo-session-keepalive:$BUILD_ID'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/bringo-session-keepalive:latest'
  - 'gcr.io/$PROJECT_ID/bringo-session-keepalive:$BUILD_ID'

timeout: 1800s

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
