apiVersion: apps/v1
kind: Deployment
metadata:
  name: bringo-frontend
  labels:
    app: bringo-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bringo-frontend
  template:
    metadata:
      labels:
        app: bringo-frontend
    spec:
      serviceAccountName: bringo-multimodal-api-sa
      containers:
        - name: bringo-frontend
          image: IMAGE_URL_PLACEHOLDER
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
